<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Scuola Guida — Quiz Lifecycle &amp; Enrollment Workflow</title>
  <desc>Quiz lifecycle states and viewer registration and enrollment workflow</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Titolo -->
  <text x="340" y="35" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">Quiz Lifecycle &amp; Enrollment Workflow — scuola-guida</text>

  <!-- Sezione 1 -->
  <text x="30" y="75" font-size="14" font-weight="500" fill="#444441">Quiz States (admin / editor)</text>

  <!-- Draft -->
  <rect x="30" y="95" width="130" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="95" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Draft</text>
  <text x="95" y="155" text-anchor="middle" font-size="11" fill="#854F0B">editor può editare</text>

  <line x1="160" y1="135" x2="208" y2="135" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Published -->
  <rect x="210" y="95" width="130" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="275" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Published</text>
  <text x="275" y="155" text-anchor="middle" font-size="11" fill="#185FA5">visibile in calendario</text>

  <line x1="340" y1="135" x2="388" y2="135" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Confirmed -->
  <rect x="390" y="95" width="130" height="80" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="455" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">Confirmed</text>
  <text x="455" y="155" text-anchor="middle" font-size="11" fill="#3B6D11">aperto alle iscrizioni</text>

  <!-- Separatore -->
  <line x1="30" y1="215" x2="640" y2="215" stroke="#D3D1C7" stroke-width="0.8"/>

  <!-- Sezione 2 -->
  <text x="30" y="248" font-size="14" font-weight="500" fill="#444441">Viewer Registration (anagrafica)</text>

  <!-- None -->
  <rect x="30" y="265" width="110" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="85" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">None</text>
  <text x="85" y="325" text-anchor="middle" font-size="11" fill="#5F5E5A">può registrarsi</text>

  <line x1="140" y1="305" x2="178" y2="305" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pending anagrafica -->
  <rect x="180" y="265" width="110" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="235" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Pending</text>
  <text x="235" y="325" text-anchor="middle" font-size="11" fill="#854F0B">attende admin</text>

  <line x1="290" y1="305" x2="328" y2="305" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Approved anagrafica -->
  <rect x="330" y="265" width="110" height="80" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="385" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">Approved</text>
  <text x="385" y="325" text-anchor="middle" font-size="11" fill="#3B6D11">può iscriversi</text>

  <line x1="440" y1="305" x2="478" y2="305" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Rejected anagrafica -->
  <rect x="480" y="265" width="110" height="80" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="535" y="300" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">Rejected</text>
  <text x="535" y="325" text-anchor="middle" font-size="11" fill="#A32D2D">può ri-inviare</text>

  <!-- Separatore -->
  <line x1="30" y1="395" x2="640" y2="395" stroke="#D3D1C7" stroke-width="0.8"/>

  <!-- Sezione 3 -->
  <text x="30" y="428" font-size="14" font-weight="500" fill="#444441">Enrollment States (su quiz confermato)</text>
  <text x="30" y="452" font-size="12" fill="#888780">Solo disponibile dopo approvazione anagrafica</text>

  <!-- Pending enrollment -->
  <rect x="30" y="470" width="130" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="95" y="505" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Pending</text>
  <text x="95" y="530" text-anchor="middle" font-size="11" fill="#854F0B">attende admin</text>

  <line x1="160" y1="510" x2="208" y2="510" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Approved enrollment -->
  <rect x="210" y="470" width="130" height="80" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="275" y="505" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">Approved</text>
  <text x="275" y="530" text-anchor="middle" font-size="11" fill="#3B6D11">può svolgere quiz</text>

  <line x1="340" y1="510" x2="388" y2="510" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Rejected enrollment -->
  <rect x="390" y="470" width="130" height="80" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="455" y="505" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">Rejected</text>
  <text x="455" y="530" text-anchor="middle" font-size="11" fill="#A32D2D">accesso revocato</text>

  <!-- Scheduler note -->
  <rect x="50" y="600" width="580" height="95" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5,4"/>
  <text x="340" y="628" text-anchor="middle" font-size="12" fill="#5F5E5A">Lo scheduler enrollments:close-expired (dailyAt 00:05) chiude automaticamente</text>
  <text x="340" y="650" text-anchor="middle" font-size="12" fill="#5F5E5A">le iscrizioni pending rimaste oltre la data di chiusura del quiz.</text>
  <text x="340" y="672" text-anchor="middle" font-size="12" fill="#5F5E5A">Notifica IscrizioneQuizRifiutata inviata fire-and-forget sulla coda emails.</text>
</svg>
