<svg width="680" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Scuola Guida — Role-based Access Control</title>
  <desc>Three-tier role system: admin, editor, viewer with granular permissions stored as JSON</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Titolo -->
  <text x="340" y="35" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">Role-based Access Control — scuola-guida</text>

  <!-- Admin -->
  <rect x="30" y="60" width="170" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="115" y="95" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Admin</text>
  <text x="115" y="120" text-anchor="middle" font-size="12" fill="#534AB7">Full system access</text>

  <!-- Editor -->
  <rect x="255" y="60" width="170" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="95" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Editor</text>
  <text x="340" y="120" text-anchor="middle" font-size="12" fill="#185FA5">CRUD limitato</text>

  <!-- Viewer -->
  <rect x="480" y="60" width="170" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="565" y="95" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Viewer</text>
  <text x="565" y="120" text-anchor="middle" font-size="12" fill="#0F6E56">Solo quiz</text>

  <!-- frecce -->
  <line x1="115" y1="150" x2="115" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="150" x2="340" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="565" y1="150" x2="565" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Admin permissions -->
  <rect x="30" y="200" width="170" height="185" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="115" y="228" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Permissions</text>
  <text x="115" y="255" text-anchor="middle" font-size="12" fill="#534AB7">edit_questions</text>
  <text x="115" y="275" text-anchor="middle" font-size="12" fill="#534AB7">edit_categories</text>
  <text x="115" y="295" text-anchor="middle" font-size="12" fill="#534AB7">publish_quiz</text>
  <text x="115" y="315" text-anchor="middle" font-size="12" fill="#534AB7">confirm_quiz</text>
  <text x="115" y="335" text-anchor="middle" font-size="12" fill="#534AB7">manage_users</text>
  <text x="115" y="355" text-anchor="middle" font-size="12" fill="#534AB7">audit log access</text>

  <!-- Editor permissions -->
  <rect x="255" y="200" width="170" height="185" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="228" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Permissions</text>
  <text x="340" y="255" text-anchor="middle" font-size="12" fill="#185FA5">create_question</text>
  <text x="340" y="275" text-anchor="middle" font-size="12" fill="#185FA5">edit_own_questions</text>
  <text x="340" y="295" text-anchor="middle" font-size="12" fill="#185FA5">edit_categories</text>
  <text x="340" y="315" text-anchor="middle" font-size="12" fill="#185FA5">create_draft_quiz</text>
  <text x="340" y="335" text-anchor="middle" font-size="12" fill="#185FA5">(no publish)</text>
  <text x="340" y="355" text-anchor="middle" font-size="12" fill="#185FA5">(no confirm)</text>

  <!-- Viewer permissions -->
  <rect x="480" y="200" width="170" height="185" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="565" y="228" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Permissions</text>
  <text x="565" y="255" text-anchor="middle" font-size="12" fill="#0F6E56">attempt_quiz</text>
  <text x="565" y="275" text-anchor="middle" font-size="12" fill="#0F6E56">study_mode</text>
  <text x="565" y="295" text-anchor="middle" font-size="12" fill="#0F6E56">simulator</text>
  <text x="565" y="315" text-anchor="middle" font-size="12" fill="#0F6E56">bookmark_question</text>
  <text x="565" y="335" text-anchor="middle" font-size="12" fill="#0F6E56">report_question</text>
  <text x="565" y="355" text-anchor="middle" font-size="12" fill="#0F6E56">(dopo anagrafica)</text>

  <!-- frecce verso storage -->
  <line x1="115" y1="385" x2="115" y2="428" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="385" x2="340" y2="428" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="565" y1="385" x2="565" y2="428" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stored as JSON -->
  <rect x="30" y="430" width="170" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="115" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Stored as JSON</text>
  <text x="115" y="490" text-anchor="middle" font-size="12" fill="#534AB7">users.permissions</text>

  <!-- Updated via UI -->
  <rect x="255" y="430" width="170" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Updated via UI</text>
  <text x="340" y="490" text-anchor="middle" font-size="12" fill="#185FA5">Admin → Roles</text>

  <!-- Enforced via -->
  <rect x="480" y="430" width="170" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="565" y="458" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Enforced via</text>
  <text x="565" y="478" text-anchor="middle" font-size="12" fill="#0F6E56">abort_unless(</text>
  <text x="565" y="498" text-anchor="middle" font-size="12" fill="#0F6E56">canEditXxx(), 403)</text>

  <!-- Footer note -->
  <rect x="50" y="565" width="580" height="110" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5,4"/>
  <text x="340" y="595" text-anchor="middle" font-size="12" fill="#5F5E5A">Il viewer deve completare la registrazione anagrafica (pending → approved)</text>
  <text x="340" y="617" text-anchor="middle" font-size="12" fill="#5F5E5A">prima di potersi iscrivere ai quiz confermati.</text>
  <text x="340" y="647" text-anchor="middle" font-size="12" fill="#5F5E5A">Tutti i check nei Controller usano abort_unless(auth()->user()->canEditXxx(), 403)</text>
</svg>
