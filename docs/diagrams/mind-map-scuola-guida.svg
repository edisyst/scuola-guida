<svg width="680" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Mind map scuola-guida</title>
  <desc>Struttura del progetto scuola-guida su 4 livelli: stack tecnologico, area admin, area viewer e cicli di vita</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; }
      .t   { font-size: 13px; font-weight: 400; }
      .n-blue   { fill: #E6F1FB; stroke: #185FA5; }
      .n-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
      .n-teal   { fill: #E1F5EE; stroke: #0F6E56; }
      .n-purple { fill: #EEEDFE; stroke: #534AB7; }
      .n-coral  { fill: #FAECE7; stroke: #993C1D; }
      .n-amber  { fill: #FAEEDA; stroke: #854F0B; }
      .n-green  { fill: #EAF3DE; stroke: #3B6D11; }
      .l-primary   { stroke: #B4B2A9; fill: none; }
      .l-secondary { stroke: #D3D1C7; fill: none; }
    </style>
  </defs>

  <!-- ─── Connettori: Stack tech → figli ─── -->
  <line x1="100" y1="160" x2="90"  y2="120" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="160" x2="215" y2="120" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ─── Connettori: Area Admin → figli ─── -->
  <line x1="510" y1="160" x2="490" y2="120" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="160" x2="610" y2="120" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ─── Connettori: Scuola Guida → 5 figli diretti ─── -->
  <line x1="280" y1="260" x2="220" y2="208" class="l-primary" stroke-width="1"/>
  <line x1="400" y1="260" x2="460" y2="208" class="l-primary" stroke-width="1"/>
  <line x1="300" y1="290" x2="115" y2="360" class="l-primary" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="290" x2="340" y2="360" class="l-primary" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="380" y1="290" x2="565" y2="360" class="l-primary" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ─── Connettori: Cicli di vita → figli ─── -->
  <line x1="80"  y1="408" x2="70"  y2="440" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="408" x2="190" y2="440" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ─── Connettori: Area Viewer → figli ─── -->
  <line x1="535" y1="408" x2="505" y2="440" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="595" y1="408" x2="615" y2="440" class="l-secondary" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- ═══ LIVELLO 0 — Figli foglia (top, y=80) ═══ -->
  <rect x="40"  y="80" width="100" height="40" rx="6" class="n-purple" stroke-width="0.5"/>
  <text class="t" x="90"  y="100" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Laravel 11</text>

  <rect x="165" y="80" width="100" height="40" rx="6" class="n-purple" stroke-width="0.5"/>
  <text class="t" x="215" y="100" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Livewire 3</text>

  <rect x="440" y="80" width="100" height="40" rx="6" class="n-teal" stroke-width="0.5"/>
  <text class="t" x="490" y="100" text-anchor="middle" dominant-baseline="central" fill="#085041">Domande</text>

  <rect x="560" y="80" width="100" height="40" rx="6" class="n-teal" stroke-width="0.5"/>
  <text class="t" x="610" y="100" text-anchor="middle" dominant-baseline="central" fill="#085041">Quiz</text>

  <!-- ═══ LIVELLO 1 — Stack tech e Area Admin (y=160) ═══ -->
  <rect x="60"  y="160" width="160" height="48" rx="8" class="n-gray" stroke-width="0.5"/>
  <text class="th" x="140" y="184" text-anchor="middle" dominant-baseline="central" fill="#444441">Stack tech</text>

  <rect x="460" y="160" width="160" height="48" rx="8" class="n-teal" stroke-width="0.5"/>
  <text class="th" x="540" y="184" text-anchor="middle" dominant-baseline="central" fill="#085041">Area Admin</text>

  <!-- ═══ LIVELLO 2 — Scuola Guida (centro, y=230) ═══ -->
  <rect x="280" y="230" width="120" height="60" rx="8" class="n-blue" stroke-width="0.5"/>
  <text class="th" x="340" y="252" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Scuola</text>
  <text class="th" x="340" y="272" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Guida</text>

  <!-- ═══ LIVELLO 3 — Cicli, Features, Area Viewer (y=360) ═══ -->
  <rect x="40"  y="360" width="150" height="48" rx="8" class="n-coral" stroke-width="0.5"/>
  <text class="th" x="115" y="384" text-anchor="middle" dominant-baseline="central" fill="#712B13">Cicli di vita</text>

  <rect x="265" y="360" width="150" height="48" rx="8" class="n-amber" stroke-width="0.5"/>
  <text class="th" x="340" y="384" text-anchor="middle" dominant-baseline="central" fill="#633806">Features</text>

  <rect x="490" y="360" width="150" height="48" rx="8" class="n-green" stroke-width="0.5"/>
  <text class="th" x="565" y="384" text-anchor="middle" dominant-baseline="central" fill="#27500A">Area Viewer</text>

  <!-- ═══ LIVELLO 4 — Figli foglia (bottom, y=440) ═══ -->
  <rect x="20"  y="440" width="100" height="40" rx="6" class="n-coral" stroke-width="0.5"/>
  <text class="t" x="70"  y="460" text-anchor="middle" dominant-baseline="central" fill="#712B13">Quiz state</text>

  <rect x="135" y="440" width="110" height="40" rx="6" class="n-coral" stroke-width="0.5"/>
  <text class="t" x="190" y="460" text-anchor="middle" dominant-baseline="central" fill="#712B13">Iscriz. state</text>

  <rect x="455" y="440" width="100" height="40" rx="6" class="n-green" stroke-width="0.5"/>
  <text class="t" x="505" y="460" text-anchor="middle" dominant-baseline="central" fill="#27500A">Simulatore</text>

  <rect x="570" y="440" width="90"  height="40" rx="6" class="n-green" stroke-width="0.5"/>
  <text class="t" x="615" y="460" text-anchor="middle" dominant-baseline="central" fill="#27500A">Studio</text>
</svg>
