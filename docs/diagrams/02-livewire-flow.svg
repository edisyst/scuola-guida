<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>Scuola Guida — Livewire Component Flow</title>
  <desc>Four Livewire 3 components: MediaManager, NotificationBell, QuestionReport, Bookmarks</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Titolo -->
  <text x="340" y="35" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">Livewire 3 Components — scuola-guida</text>

  <!-- MediaManager -->
  <rect x="30" y="60" width="140" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="100" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">MediaManager</text>
  <text x="100" y="115" text-anchor="middle" font-size="12" fill="#185FA5">Upload, rename,</text>
  <text x="100" y="135" text-anchor="middle" font-size="12" fill="#185FA5">delete images</text>

  <!-- NotificationBell -->
  <rect x="200" y="60" width="140" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="270" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">NotificationBell</text>
  <text x="270" y="115" text-anchor="middle" font-size="12" fill="#0F6E56">wire:poll.30s</text>
  <text x="270" y="135" text-anchor="middle" font-size="12" fill="#0F6E56">unreadCount</text>

  <!-- QuestionReport -->
  <rect x="370" y="60" width="140" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="440" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">QuestionReport</text>
  <text x="440" y="115" text-anchor="middle" font-size="12" fill="#993C1D">Report bugs</text>
  <text x="440" y="135" text-anchor="middle" font-size="12" fill="#993C1D">via form</text>

  <!-- Bookmarks -->
  <rect x="540" y="60" width="110" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="595" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Bookmarks</text>
  <text x="595" y="115" text-anchor="middle" font-size="12" fill="#534AB7">Toggle</text>
  <text x="595" y="135" text-anchor="middle" font-size="12" fill="#534AB7">add / remove</text>

  <!-- frecce riga 1 → 2 -->
  <line x1="100" y1="150" x2="100" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="270" y1="150" x2="270" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="150" x2="440" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="595" y1="150" x2="595" y2="198" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- File Upload -->
  <rect x="30" y="200" width="140" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="100" y="230" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">File Upload</text>
  <text x="100" y="255" text-anchor="middle" font-size="12" fill="#185FA5">→ storage/</text>
  <text x="100" y="275" text-anchor="middle" font-size="12" fill="#185FA5">public</text>

  <!-- Poll Interval -->
  <rect x="200" y="200" width="140" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="270" y="230" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Poll Interval</text>
  <text x="270" y="255" text-anchor="middle" font-size="12" fill="#0F6E56">fetch unread()</text>
  <text x="270" y="275" text-anchor="middle" font-size="12" fill="#0F6E56">ogni 30s</text>

  <!-- #[Validate] -->
  <rect x="370" y="200" width="140" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="440" y="230" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">#[Validate]</text>
  <text x="440" y="255" text-anchor="middle" font-size="12" fill="#993C1D">persist</text>
  <text x="440" y="275" text-anchor="middle" font-size="12" fill="#993C1D">report_id</text>

  <!-- Toggle State -->
  <rect x="540" y="200" width="110" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="595" y="230" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Toggle</text>
  <text x="595" y="255" text-anchor="middle" font-size="12" fill="#534AB7">State</text>
  <text x="595" y="275" text-anchor="middle" font-size="12" fill="#534AB7">constraint</text>

  <!-- frecce riga 2 → 3 -->
  <line x1="100" y1="290" x2="100" y2="338" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="270" y1="290" x2="270" y2="338" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="290" x2="440" y2="338" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="595" y1="290" x2="595" y2="338" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- wire:loading -->
  <rect x="30" y="340" width="140" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="100" y="370" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">wire:loading</text>
  <text x="100" y="395" text-anchor="middle" font-size="12" fill="#185FA5">spinner</text>
  <text x="100" y="415" text-anchor="middle" font-size="12" fill="#185FA5">feedback</text>

  <!-- Cache Bypass -->
  <rect x="200" y="340" width="140" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="270" y="370" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Cache Bypass</text>
  <text x="270" y="395" text-anchor="middle" font-size="12" fill="#0F6E56">no composer</text>
  <text x="270" y="415" text-anchor="middle" font-size="12" fill="#0F6E56">load</text>

  <!-- Anti-spam -->
  <rect x="370" y="340" width="140" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="440" y="370" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Anti-spam</text>
  <text x="440" y="395" text-anchor="middle" font-size="12" fill="#993C1D">max 3</text>
  <text x="440" y="415" text-anchor="middle" font-size="12" fill="#993C1D">pending</text>

  <!-- DB Persist -->
  <rect x="540" y="340" width="110" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="595" y="370" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">DB Persist</text>
  <text x="595" y="395" text-anchor="middle" font-size="12" fill="#534AB7">bookmarks</text>
  <text x="595" y="415" text-anchor="middle" font-size="12" fill="#534AB7">table</text>

  <!-- Box pattern comuni -->
  <rect x="50" y="480" width="580" height="220" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5,4"/>
  <text x="340" y="510" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Pattern Livewire comuni</text>

  <text x="70" y="540" font-size="12" fill="#5F5E5A">wire:model.blur — binding senza .defer né .live</text>
  <text x="70" y="562" font-size="12" fill="#5F5E5A">wire:click — action dispatch</text>
  <text x="70" y="584" font-size="12" fill="#5F5E5A">wire:confirm — azioni distruttive</text>
  <text x="70" y="606" font-size="12" fill="#5F5E5A">wire:loading.attr="disabled" — blocca durante request</text>

  <text x="360" y="540" font-size="12" fill="#5F5E5A">#[Validate] — validazione reattiva</text>
  <text x="360" y="562" font-size="12" fill="#5F5E5A">$this->dispatch() — eventi tra componenti</text>
  <text x="360" y="584" font-size="12" fill="#5F5E5A">Polling isolato — no query nel composer</text>
  <text x="360" y="606" font-size="12" fill="#5F5E5A">@auth + controllo ruolo nei viewer</text>
</svg>
