<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="#4361ee"/>
  <!-- Steering wheel (volante) - outer ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-width="30"/>
  <!-- Steering wheel hub -->
  <circle cx="256" cy="256" r="40" fill="#ffffff"/>
  <!-- Spoke top -->
  <line x1="256" y1="215" x2="256" y2="96" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
  <!-- Spoke bottom-left -->
  <line x1="222" y1="277" x2="124" y2="383" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
  <!-- Spoke bottom-right -->
  <line x1="290" y1="277" x2="388" y2="383" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
</svg>
