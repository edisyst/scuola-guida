<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
  <!-- Sfondo blu -->
  <rect width="60" height="30" fill="#012169"/>

  <!-- Croce di Sant'Andrea — diagonali bianche -->
  <path d="M0,0 L60,30 M60,0 L0,30" stroke="#FFFFFF" stroke-width="8"/>

  <!-- Croce di San Patrizio — diagonali rosse con controfasciatura -->
  <!-- Diagonale NW-SE: rosso sopra nel quadrante NW, sotto nel SE -->
  <path d="M0,0 L26,15" stroke="#C8102E" stroke-width="4"/>
  <path d="M34,15 L60,30" stroke="#C8102E" stroke-width="4"/>
  <!-- Diagonale NE-SW: rosso sopra nel quadrante NE, sotto nel SW -->
  <path d="M60,0 L34,15" stroke="#C8102E" stroke-width="4"/>
  <path d="M26,15 L0,30" stroke="#C8102E" stroke-width="4"/>

  <!-- Croce di San Giorgio — braccio verticale bianco -->
  <rect x="24" y="0" width="12" height="30" fill="#FFFFFF"/>
  <!-- Croce di San Giorgio — braccio orizzontale bianco -->
  <rect x="0" y="11" width="60" height="8" fill="#FFFFFF"/>

  <!-- Croce di San Giorgio — braccio verticale rosso -->
  <rect x="27" y="0" width="6" height="30" fill="#C8102E"/>
  <!-- Croce di San Giorgio — braccio orizzontale rosso -->
  <rect x="0" y="13" width="60" height="4" fill="#C8102E"/>
</svg>
