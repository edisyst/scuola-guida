  <!-- Spoke bottom-left -->
  <line x1="13.4" y1="17.6" x2="6.2" y2="25.5" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Spoke bottom-right -->
  <line x1="18.6" y1="17.6" x2="25.8" y2="25.5" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
</svg>
